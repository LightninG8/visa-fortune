<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <div class="preloader" id="preloader">
      <div class="preloader__spinner"></div>
    </div>

    <div class="wheel">
      <div class="wheel__container">
        <div class="wheel__title">
          <img class="wheel__img title-img" src="./img/title.png" alt="" />
        </div>

        <div class="wheel__spinner-container">
          <img class="wheel__img spin-img" src="./img/spin.png" alt="Крутить" />
          <img class="wheel__img ticker-img" src="./img/ticker.png" alt="" />
          <div class="wheel__spinner anim">
            <img class="wheel__img wheel-img" src="./img/wheel.png" alt="" />
          </div>
        </div>
      </div>

      <div class="wheel__available-spins" style="visibility: hidden">
        Доступно вращений:
        <span class="available-spins">2</span>
        <span class="deal-spins hide">4</span>
      </div>
      <audio src="./click_wheel.mp3" class="hide" preload="auto"></audio>

      <div class="wheel__popup popup hide">
        <div class="popup__text">Приз</div>
        <div class="popup__close">
          <img src="./img/popup-close.png" alt="X" class="popup__image" />
        </div>
      </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
